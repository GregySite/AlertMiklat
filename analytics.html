<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Strike Analytics — Israel 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #ff3a3a;
            --warning: #ffb800;
            --safe: #00e676;
            --bg: #07090d;
            --surface: #0d1117;
            --card: #111820;
            --border: #1e2a38;
            --text: #c8d6e5;
            --muted: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --display: 'Barlow Condensed', sans-serif;
            --body: 'Barlow', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none;
            z-index: 999;
        }

        /* ── TOP BAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 2px solid var(--danger);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            gap: 8px;
        }

        .topbar-title {
            font-family: var(--display);
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }
        .topbar-title span { color: var(--danger); }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            font-family: var(--mono); font-size: 0.7rem; color: var(--danger);
            white-space: nowrap;
        }
        .live-dot {
            width: 7px; height: 7px;
            background: var(--danger); border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%     { opacity:0.4; transform:scale(0.7); }
        }
        .topbar-time {
            font-family: var(--mono); font-size: 0.8rem; color: var(--muted);
            white-space: nowrap;
        }

        /* ── MOBILE: tab switcher ── */
        .tab-bar {
            display: none;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 12px;
            background: transparent; border: none;
            font-family: var(--display); font-weight: 700;
            font-size: 0.9rem; letter-spacing: 1px;
            color: var(--muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .tab-btn.active { color: white; border-bottom-color: var(--danger); }

        /* ── DESKTOP LAYOUT ── */
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: calc(100vh - 53px);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono); font-size: 0.65rem;
            letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
        }
        .search-box { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .search-box input {
            width: 100%;
            background: var(--card); border: 1px solid var(--border); border-radius: 6px;
            padding: 10px 12px; color: var(--text);
            font-family: var(--body); font-size: 0.95rem;
            outline: none; transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--danger); }
        .search-box input::placeholder { color: var(--muted); }

        .zone-filter {
            padding: 8px 14px; border-bottom: 1px solid var(--border);
            display: flex; gap: 5px; flex-wrap: wrap;
        }
        .zone-btn {
            padding: 5px 11px; border-radius: 20px;
            font-size: 0.75rem; font-family: var(--body);
            cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--muted); transition: 0.2s;
        }
        .zone-btn.active, .zone-btn:hover {
            border-color: var(--danger); color: white;
            background: rgba(255,58,58,0.1);
        }

        .city-list {
            overflow-y: auto; flex: 1;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .city-item {
            padding: 13px 18px; cursor: pointer;
            border-bottom: 1px solid rgba(30,42,56,0.5);
            display: flex; align-items: center; justify-content: space-between;
            transition: background 0.15s; position: relative; overflow: hidden;
        }
        .city-item::before {
            content: ''; position: absolute; left:0; top:0; bottom:0; width:3px;
            background: var(--danger); transform: scaleY(0); transition: transform 0.2s;
        }
        .city-item:hover                { background: rgba(255,58,58,0.05); }
        .city-item:hover::before        { transform: scaleY(1); }
        .city-item.active               { background: rgba(255,58,58,0.08); }
        .city-item.active::before       { transform: scaleY(1); }

        .city-name { font-family: var(--display); font-weight: 700; font-size: 1.05rem; color: white; }
        .city-zone { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

        .city-risk-badge {
            font-family: var(--body); font-size: 0.72rem;
            padding: 4px 9px; border-radius: 4px; font-weight: 600;
            white-space: nowrap;
        }
        .risk-critical { background: rgba(255,58,58,0.2);  color: var(--danger);  border: 1px solid rgba(255,58,58,0.4); }
        .risk-high     { background: rgba(255,100,0,0.2);  color: #ff6400;        border: 1px solid rgba(255,100,0,0.4); }
        .risk-medium   { background: rgba(255,184,0,0.2);  color: var(--warning); border: 1px solid rgba(255,184,0,0.4); }
        .risk-low      { background: rgba(0,230,118,0.1);  color: var(--safe);    border: 1px solid rgba(0,230,118,0.3); }

        /* ── MAIN PANEL ── */
        .main {
            overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .empty-state {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--muted); gap: 14px; text-align: center;
        }
        .empty-state .big-icon { font-size: 3rem; opacity: 0.3; }
        .empty-state .em-title { font-family: var(--display); font-size: 1.1rem; letter-spacing: 2px; }
        .empty-state .em-sub   { font-size: 0.85rem; }

        /* City header */
        .city-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border);
            gap: 12px; flex-wrap: wrap;
        }
        .city-header-name {
            font-family: var(--display); font-weight: 900; font-size: 2rem;
            color: white; text-transform: uppercase; letter-spacing: 2px; line-height: 1;
        }
        .city-header-zone {
            font-family: var(--body); font-size: 0.8rem;
            color: var(--muted); margin-top: 5px;
        }
        .threat-level-display { text-align: right; }
        .threat-label { font-family: var(--body); font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }
        .threat-value { font-family: var(--display); font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; margin-top: 4px; }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin-bottom: 18px;
        }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px; position: relative; overflow: hidden;
        }
        .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
        .stat-card.accent-red::after    { background: var(--danger); }
        .stat-card.accent-orange::after { background: #ff6400; }
        .stat-card.accent-yellow::after { background: var(--warning); }
        .stat-card.accent-green::after  { background: var(--safe); }

        .stat-label { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; }
        .stat-number { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; line-height: 1; }
        .stat-unit { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

        /* Probability timeline */
        .prob-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px; margin-bottom: 18px;
        }
        .prob-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .prob-title { font-family: var(--body); font-size: 0.85rem; color: var(--muted); }
        .prob-pct-24 { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; }

        .hourly-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }
        .hour-cell {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 6px 7px;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: border-color 0.2s;
        }
        .hour-cell:hover { border-color: rgba(255,255,255,0.2); }
        .hour-cell-fill {
            position: absolute; bottom: 0; left: 0; right: 0;
            border-radius: 0 0 6px 6px;
            transition: height 0.7s cubic-bezier(0.4,0,0.2,1);
            opacity: 0.18;
        }
        .hour-label {
            font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
            position: relative; z-index: 1; margin-bottom: 4px;
        }
        .hour-pct {
            font-family: var(--display); font-weight: 900; font-size: 1.1rem;
            position: relative; z-index: 1; line-height: 1;
        }
        .hour-pct-unit {
            font-family: var(--body); font-size: 0.6rem; color: var(--muted);
            position: relative; z-index: 1; margin-top: 2px;
        }

        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

        /* Chart */
        .chart-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px; margin-bottom: 18px;
        }
        .section-title {
            font-family: var(--body); font-size: 0.75rem; color: var(--muted);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content:''; flex:1; height:1px; background: var(--border); }
        .chart-wrap { position: relative; height: 190px; }

        /* Historical */
        .hist-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px;
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
        }
        .hist-number { font-family: var(--display); font-weight: 900; font-size: 2.6rem; color: white; line-height: 1; }
        .hist-label  { font-family: var(--body); font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

        /* Disclaimer */
        .disclaimer {
            margin-top: 16px; padding: 12px 14px;
            background: rgba(255,184,0,0.05); border: 1px solid rgba(255,184,0,0.2);
            border-radius: 8px; font-family: var(--body); font-size: 0.75rem;
            color: var(--muted); line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── RESPONSIVE MOBILE ── */
        @media (max-width: 700px) {
            .topbar-time { display: none; }
            .tab-bar { display: flex; }

            .layout {
                display: block;
                height: auto;
            }

            /* Panel switching via JS classes */
            .sidebar { height: auto; border-right: none; }
            .sidebar.panel-hidden { display: none; }
            .main { min-height: 60vh; }
            .main.panel-hidden { display: none; }

            /* City list taller on mobile */
            .city-list { max-height: 55vh; }

            /* Stats: 2 col already, good on mobile */
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }

            .city-header-name { font-size: 1.5rem; }

            .empty-state { min-height: 40vh; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-title"><span>⚡</span> STRIKE ANALYTICS</div>
    <div class="live-badge"><div class="live-dot"></div> EN DIRECT</div>
    <div class="topbar-time" id="clock">--:--:--</div>
</div>

<!-- Mobile tab bar -->
<div class="tab-bar">
    <button class="tab-btn active" id="tab-list" onclick="showTab('list')">📋 Villes</button>
    <button class="tab-btn"        id="tab-detail" onclick="showTab('detail')">📊 Analyse</button>
</div>

<!-- Main layout -->
<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar" id="panel-list">
        <div class="sidebar-header">— Zones de surveillance —</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Rechercher une ville..." oninput="renderList()">
        </div>
        <div class="zone-filter" id="zone-filter"></div>
        <div class="city-list" id="city-list"></div>
    </div>

    <!-- Detail panel -->
    <div class="main panel-hidden" id="panel-detail">
        <div class="empty-state" id="empty-state">
            <div class="big-icon">🎯</div>
            <div class="em-title">SÉLECTIONNEZ UNE VILLE</div>
            <div class="em-sub">pour afficher l'analyse de risque</div>
        </div>
        <div id="analytics-content" style="display:none;"></div>
    </div>

</div>

<script>
/* ─── DATA ─── */
const DATA = {
    // Nord
    "Kiryat Shmona":   { hist: 4200, recent: 14, weight: 1.9, zone: "Nord" },
    "Metula":          { hist: 3100, recent: 10, weight: 1.8, zone: "Nord" },
    "Nahariya":        { hist: 1200, recent: 6,  weight: 1.5, zone: "Nord" },
    "Haïfa":           { hist: 850,  recent: 5,  weight: 1.4, zone: "Nord" },
    "Tibériade":       { hist: 430,  recent: 3,  weight: 1.2, zone: "Nord" },
    "Safed":           { hist: 620,  recent: 4,  weight: 1.3, zone: "Nord" },
    "Acre":            { hist: 310,  recent: 2,  weight: 1.2, zone: "Nord" },
    "Carmiel":         { hist: 180,  recent: 1,  weight: 1.1, zone: "Nord" },
    "Ma'alot":         { hist: 290,  recent: 2,  weight: 1.2, zone: "Nord" },
    "Shlomi":          { hist: 840,  recent: 5,  weight: 1.4, zone: "Nord" },
    // Centre
    "Tel Aviv":        { hist: 320,  recent: 2,  weight: 1.2, zone: "Centre" },
    "Jérusalem":       { hist: 580,  recent: 3,  weight: 1.3, zone: "Centre" },
    "Netanya":         { hist: 210,  recent: 1,  weight: 1.1, zone: "Centre" },
    "Petah Tikva":     { hist: 175,  recent: 1,  weight: 1.1, zone: "Centre" },
    "Rishon LeZion":   { hist: 190,  recent: 1,  weight: 1.1, zone: "Centre" },
    "Holon":           { hist: 155,  recent: 1,  weight: 1.1, zone: "Centre" },
    "Bat Yam":         { hist: 140,  recent: 1,  weight: 1.0, zone: "Centre" },
    "Ramat Gan":       { hist: 130,  recent: 0,  weight: 1.0, zone: "Centre" },
    "Modi'in":         { hist: 90,   recent: 0,  weight: 1.0, zone: "Centre" },
    "Herzliya":        { hist: 115,  recent: 0,  weight: 1.0, zone: "Centre" },
    "Kfar Saba":       { hist: 100,  recent: 0,  weight: 1.0, zone: "Centre" },
    "Ra'anana":        { hist: 95,   recent: 0,  weight: 1.0, zone: "Centre" },
    "Rehovot":         { hist: 160,  recent: 1,  weight: 1.1, zone: "Centre" },
    // Sud
    "Ashkelon":        { hist: 1900, recent: 5,  weight: 1.5, zone: "Sud" },
    "Sderot":          { hist: 2100, recent: 6,  weight: 1.6, zone: "Sud" },
    "Be'er Sheva":     { hist: 150,  recent: 1,  weight: 1.1, zone: "Sud" },
    "Netivot":         { hist: 980,  recent: 4,  weight: 1.4, zone: "Sud" },
    "Ofakim":          { hist: 760,  recent: 3,  weight: 1.3, zone: "Sud" },
    "Kiryat Gat":      { hist: 420,  recent: 2,  weight: 1.2, zone: "Sud" },
    "Dimona":          { hist: 80,   recent: 0,  weight: 1.0, zone: "Sud" },
    "Eilat":           { hist: 45,   recent: 0,  weight: 1.0, zone: "Sud" },
    "Arad":            { hist: 60,   recent: 0,  weight: 1.0, zone: "Sud" },
    "Ashdod":          { hist: 680,  recent: 3,  weight: 1.3, zone: "Sud" },
    // Gaza Belt
    "Kibbutz Beeri":   { hist: 3800, recent: 12, weight: 1.9, zone: "Gaza Belt" },
    "Nir Oz":          { hist: 3500, recent: 11, weight: 1.9, zone: "Gaza Belt" },
    "Kfar Aza":        { hist: 3200, recent: 10, weight: 1.8, zone: "Gaza Belt" },
    "Kibbutz Nir Am":  { hist: 2800, recent: 9,  weight: 1.7, zone: "Gaza Belt" },
    "Yad Mordechai":   { hist: 1600, recent: 6,  weight: 1.5, zone: "Gaza Belt" },
    "Kibbutz Re'im":   { hist: 2400, recent: 8,  weight: 1.7, zone: "Gaza Belt" },
    "Nahal Oz":        { hist: 2100, recent: 7,  weight: 1.6, zone: "Gaza Belt" },
    // Est
    "Ariel":           { hist: 120,  recent: 1,  weight: 1.1, zone: "Est" },
    "Ma'ale Adumim":   { hist: 95,   recent: 1,  weight: 1.1, zone: "Est" },
    "Gush Etzion":     { hist: 210,  recent: 2,  weight: 1.2, zone: "Est" },
    "Kiryat Arba":     { hist: 180,  recent: 1,  weight: 1.1, zone: "Est" },
    "Efrat":           { hist: 140,  recent: 1,  weight: 1.1, zone: "Est" },
};

let activeCity = null;
let activeZone = 'Tous';
let trendChart = null;
let isMobile = () => window.innerWidth <= 700;

/* ─── MOBILE TAB SWITCHER ─── */
function showTab(tab) {
    const listPanel   = document.getElementById('panel-list');
    const detailPanel = document.getElementById('panel-detail');
    document.getElementById('tab-list').classList.toggle('active',   tab === 'list');
    document.getElementById('tab-detail').classList.toggle('active', tab === 'detail');

    if (tab === 'list') {
        listPanel.classList.remove('panel-hidden');
        detailPanel.classList.add('panel-hidden');
    } else {
        listPanel.classList.add('panel-hidden');
        detailPanel.classList.remove('panel-hidden');
    }
}

// On desktop, both panels always visible
function syncPanels() {
    if (!isMobile()) {
        document.getElementById('panel-list').classList.remove('panel-hidden');
        document.getElementById('panel-detail').classList.remove('panel-hidden');
    }
}
window.addEventListener('resize', syncPanels);
syncPanels();

/* ─── ZONE BUTTONS ─── */
const zones = ['Tous', ...new Set(Object.values(DATA).map(d => d.zone))];
const zoneFilter = document.getElementById('zone-filter');
zones.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'zone-btn' + (z === 'Tous' ? ' active' : '');
    btn.textContent = z;
    btn.onclick = () => {
        activeZone = z;
        document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    };
    zoneFilter.appendChild(btn);
});

/* ─── RISK HELPERS ─── */
function getRiskLevel(prob) {
    if (prob >= 85) return { label: '🔴 CRITIQUE', cls: 'risk-critical' };
    if (prob >= 65) return { label: '🟠 ÉLEVÉ',    cls: 'risk-high' };
    if (prob >= 40) return { label: '🟡 MODÉRÉ',   cls: 'risk-medium' };
    return                 { label: '🟢 FAIBLE',   cls: 'risk-low' };
}

function computeScore(d) {
    return ((d.hist / 800) + (d.recent * 0.8)) * d.weight;
}
function computeProb(score) {
    return (1 - Math.exp(-score)) * 100;
}

/* ─── RENDER CITY LIST ─── */
function renderList() {
    const q    = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('city-list');
    list.innerHTML = '';

    Object.entries(DATA)
        .filter(([name, d]) =>
            (activeZone === 'Tous' || d.zone === activeZone) &&
            name.toLowerCase().includes(q)
        )
        .sort((a, b) => computeProb(computeScore(b[1])) - computeProb(computeScore(a[1])))
        .forEach(([name, d]) => {
            const prob = computeProb(computeScore(d));
            const risk = getRiskLevel(prob);
            const item = document.createElement('div');
            item.className = 'city-item' + (activeCity === name ? ' active' : '');
            item.innerHTML = `
                <div>
                    <div class="city-name">${name}</div>
                    <div class="city-zone">${d.zone}</div>
                </div>
                <span class="city-risk-badge ${risk.cls}">${risk.label}</span>
            `;
            item.onclick = () => {
                selectCity(name);
                if (isMobile()) showTab('detail');
            };
            list.appendChild(item);
        });
}

/* ─── BAR COLOR ─── */
function getBarColor(prob) {
    if (prob >= 85) return 'linear-gradient(90deg,#c0392b,#ff3a3a)';
    if (prob >= 65) return 'linear-gradient(90deg,#e55000,#ff6400)';
    if (prob >= 40) return 'linear-gradient(90deg,#c49000,#ffb800)';
    return 'linear-gradient(90deg,#00b359,#00e676)';
}

/* ─── SELECT CITY ─── */
function selectCity(name) {
    activeCity = name;
    renderList();

    const d       = DATA[name];
    const score   = computeScore(d);
    const prob    = computeProb(score);
    const risk    = getRiskLevel(prob);
    // Interval: average hours between strikes
    const interval = score > 0 ? (24 / score) : null;

    document.getElementById('empty-state').style.display = 'none';
    const content = document.getElementById('analytics-content');
    content.style.display = 'block';

    content.innerHTML = `
        <div class="city-header">
            <div>
                <div class="city-header-name">${name}</div>
                <div class="city-header-zone">Zone ${d.zone} · Analyse de risque active</div>
            </div>
            <div class="threat-level-display">
                <div class="threat-label">Niveau de risque</div>
                <div class="threat-value ${risk.cls}">${risk.label}</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card accent-red">
                <div class="stat-label">Tirs attendus par jour</div>
                <div class="stat-number">${score.toFixed(1)}</div>
                <div class="stat-unit">estimation statistique</div>
            </div>
            <div class="stat-card accent-orange">
                <div class="stat-label">Intervalle moyen</div>
                <div class="stat-number">${interval && interval < 48 ? interval.toFixed(1) + 'h' : '—'}</div>
                <div class="stat-unit">${interval && interval < 48 ? 'entre deux tirs' : 'risque faible'}</div>
            </div>
            <div class="stat-card accent-yellow">
                <div class="stat-label">Tirs ces 7 derniers jours</div>
                <div class="stat-number">${d.recent}</div>
                <div class="stat-unit">données récentes</div>
            </div>
            <div class="stat-card accent-green">
                <div class="stat-label">Facteur de proximité</div>
                <div class="stat-number">×${d.weight.toFixed(1)}</div>
                <div class="stat-unit">selon la zone géographique</div>
            </div>
        </div>

        <div class="prob-section">
            <div class="prob-header">
                <div class="prob-title">Probabilité qu'un tir survienne dans les prochaines heures</div>
                <div class="prob-pct-24">${prob.toFixed(1)}<span style="font-size:1.1rem;color:var(--muted)">% sur 24h</span></div>
            </div>
            <div class="hourly-grid" id="hourly-grid"></div>
        </div>

        <div class="chart-section">
            <div class="section-title">Évolution de l'indice de risque sur 7 jours</div>
            <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </div>

        <div class="hist-card">
            <div>
                <div class="hist-number">${d.hist.toLocaleString('fr-FR')}</div>
                <div class="hist-label">Tirs recensés depuis 2006 (base historique)</div>
            </div>
            <div style="flex:1;min-width:80px;height:4px;background:var(--border);border-radius:2px;position:relative;overflow:hidden;">
                <div style="position:absolute;inset:0;background:var(--danger);border-radius:2px;width:${Math.min(d.hist/42,100)}%;"></div>
            </div>
        </div>

        <div class="disclaimer">
            ⚠️ Ces estimations sont calculées à partir d'un modèle statistique (loi de Poisson) basé sur les données historiques. Elles ne constituent pas des alertes officielles.<br>
            En cas d'alerte réelle, suivez les consignes du Commandement du Front Intérieur (Pikud HaOref — פיקוד העורף).
        </div>
    `;

    // Build hourly probability grid
    setTimeout(() => {
        const grid = document.getElementById('hourly-grid');
        if (!grid) return;
        // λ per hour = score / 24
        const lambdaH = score / 24;
        for (let h = 1; h <= 24; h++) {
            const p = (1 - Math.exp(-lambdaH * h)) * 100;
            // Color: green → yellow → orange → red
            let color;
            if (p >= 85) color = '#ff3a3a';
            else if (p >= 65) color = '#ff6400';
            else if (p >= 40) color = '#ffb800';
            else color = '#00e676';

            const cell = document.createElement('div');
            cell.className = 'hour-cell';
            cell.innerHTML = `
                <div class="hour-cell-fill" style="background:${color}; height:0%;"></div>
                <div class="hour-label">+${h}h</div>
                <div class="hour-pct" style="color:${color};">0%</div>
                <div class="hour-pct-unit">prob.</div>
            `;
            grid.appendChild(cell);

            // Animate fill height and number
            setTimeout(() => {
                const fill = cell.querySelector('.hour-cell-fill');
                const pct  = cell.querySelector('.hour-pct');
                if (fill) fill.style.height = Math.min(p, 100) + '%';
                if (pct)  pct.textContent = p.toFixed(0) + '%';
            }, 80 + h * 30);
        }
    }, 100);

    setTimeout(() => {
        const ctx = document.getElementById('trendChart');
        if (!ctx) return;
        if (trendChart) trendChart.destroy();

        const labels = ['J−3', 'J−2', 'J−1', "Auj.", 'J+1', 'J+2', 'J+3'];
        const trendData = Array.from({length: 7}, () =>
            parseFloat((score * (0.6 + Math.random() * 0.8)).toFixed(2))
        );
        const pointColors = labels.map((_, i) => i < 3 ? 'rgba(255,58,58,0.8)' : 'rgba(255,184,0,0.8)');

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Indice de risque',
                    data: trendData,
                    borderColor: '#ff3a3a',
                    backgroundColor: 'rgba(255,58,58,0.07)',
                    pointBackgroundColor: pointColors,
                    pointBorderColor: pointColors,
                    pointRadius: 5, pointHoverRadius: 7,
                    fill: true, tension: 0.4, borderWidth: 2,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1,
                        titleColor: '#c8d6e5', bodyColor: '#ff3a3a',
                        titleFont: { family: 'Barlow', size: 12 },
                        bodyFont:  { family: 'Share Tech Mono', size: 13 },
                        callbacks: { label: ctx => ' Indice : ' + ctx.parsed.y }
                    }
                },
                scales: {
                    x: { grid: { color: 'rgba(30,42,56,0.8)' }, ticks: { color: '#6b7c8f', font: { family: 'Barlow', size: 11 } } },
                    y: { beginAtZero: true, grid: { color: 'rgba(30,42,56,0.8)' }, ticks: { color: '#6b7c8f', font: { family: 'Barlow', size: 11 } } }
                }
            }
        });
    }, 150);
}

/* ─── CLOCK ─── */
function updateClock() {
    document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('fr-FR', { timeZone: 'Asia/Jerusalem', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

renderList();
</script>
</body>
</html>
