<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Strike Analytics — Israel 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #ff3a3a;
            --warning: #ffb800;
            --safe: #00e676;
            --bg: #07090d;
            --surface: #0d1117;
            --card: #111820;
            --border: #1e2a38;
            --text: #c8d6e5;
            --muted: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --display: 'Barlow Condensed', sans-serif;
            --body: 'Barlow', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none; z-index: 999;
        }

        /* ── TOP BAR ── */
        .topbar {
            background: var(--surface); border-bottom: 2px solid var(--danger);
            padding: 10px 16px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 8px;
        }
        .topbar-title { font-family: var(--display); font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; color: white; white-space: nowrap; }
        .topbar-title span { color: var(--danger); }
        .live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.7rem; color: var(--danger); white-space: nowrap; }
        .live-dot { width: 7px; height: 7px; background: var(--danger); border-radius: 50%; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
        .topbar-time { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

        /* ── MOBILE TABS ── */
        .tab-bar { display: none; background: var(--surface); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; font-family: var(--display); font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: white; border-bottom-color: var(--danger); }

        /* ── LAYOUT ── */
        .layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 53px); }

        /* ── SIDEBAR ── */
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

        .mode-switcher { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .mode-btn { flex: 1; padding: 9px 8px; background: transparent; border: none; border-right: 1px solid var(--border); font-family: var(--body); font-size: 0.8rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active { background: rgba(255,58,58,0.12); color: white; }
        .mode-btn:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text); }

        .search-box { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .search-box input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: var(--body); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: var(--danger); }
        .search-box input::placeholder { color: var(--muted); }

        .zone-filter { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 5px; flex-wrap: wrap; }
        .zone-btn { padding: 5px 11px; border-radius: 20px; font-size: 0.75rem; font-family: var(--body); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: 0.2s; }
        .zone-btn.active, .zone-btn:hover { border-color: var(--danger); color: white; background: rgba(255,58,58,0.1); }

        .city-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .city-item { padding: 13px 18px; cursor: pointer; border-bottom: 1px solid rgba(30,42,56,0.5); display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; position: relative; overflow: hidden; }
        .city-item::before { content: ''; position: absolute; left:0; top:0; bottom:0; width:3px; background: var(--danger); transform: scaleY(0); transition: transform 0.2s; }
        .city-item:hover { background: rgba(255,58,58,0.05); }
        .city-item:hover::before, .city-item.active::before { transform: scaleY(1); }
        .city-item.active { background: rgba(255,58,58,0.08); }
        .city-name { font-family: var(--display); font-weight: 700; font-size: 1.05rem; color: white; }
        .city-zone { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
        .city-risk-badge { font-family: var(--body); font-size: 0.72rem; padding: 4px 9px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .risk-critical { background: rgba(255,58,58,0.2); color: var(--danger); border: 1px solid rgba(255,58,58,0.4); }
        .risk-high     { background: rgba(255,100,0,0.2); color: #ff6400; border: 1px solid rgba(255,100,0,0.4); }
        .risk-medium   { background: rgba(255,184,0,0.2); color: var(--warning); border: 1px solid rgba(255,184,0,0.4); }
        .risk-low      { background: rgba(0,230,118,0.1); color: var(--safe); border: 1px solid rgba(0,230,118,0.3); }

        /* ── ROUTE LIST (sidebar in route mode) ── */
        .route-list { overflow-y: auto; flex: 1; }
        .route-list-item { padding: 14px 18px; cursor: pointer; border-bottom: 1px solid rgba(30,42,56,0.5); transition: background 0.15s; position: relative; }
        .route-list-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--danger); transform:scaleY(0); transition:transform 0.2s; }
        .route-list-item:hover { background: rgba(255,58,58,0.05); }
        .route-list-item:hover::before, .route-list-item.active::before { transform: scaleY(1); }
        .route-list-item.active { background: rgba(255,58,58,0.08); }
        .route-list-name { font-family: var(--display); font-weight: 700; font-size: 1rem; color: white; }
        .route-list-meta { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

        /* ── MAIN PANEL ── */
        .main { overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 14px; text-align: center; }
        .empty-state .big-icon { font-size: 3rem; opacity: 0.3; }
        .em-title { font-family: var(--display); font-size: 1.1rem; letter-spacing: 2px; }
        .em-sub { font-size: 0.85rem; }

        /* City header */
        .city-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
        .city-header-name { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; text-transform: uppercase; letter-spacing: 2px; line-height: 1; }
        .city-header-zone { font-family: var(--body); font-size: 0.8rem; color: var(--muted); margin-top: 5px; }
        .threat-level-display { text-align: right; }
        .threat-label { font-family: var(--body); font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }
        .threat-value { font-family: var(--display); font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; margin-top: 4px; }

        /* Stats grid */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 18px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; position: relative; overflow: hidden; }
        .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
        .stat-card.accent-red::after    { background: var(--danger); }
        .stat-card.accent-orange::after { background: #ff6400; }
        .stat-card.accent-yellow::after { background: var(--warning); }
        .stat-card.accent-green::after  { background: var(--safe); }
        .stat-label { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; }
        .stat-number { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; line-height: 1; }
        .stat-unit { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

        /* Section card */
        .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 18px; }
        .section-title { font-family: var(--body); font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

        /* Prob section */
        .prob-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .prob-title { font-family: var(--body); font-size: 0.85rem; color: var(--muted); line-height: 1.4; }
        .prob-pct-24 { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; white-space: nowrap; }

        /* Hourly rows */
        .hourly-list { display: flex; flex-direction: column; gap: 5px; }
        .hour-row { display: grid; grid-template-columns: 110px 1fr 52px; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 7px; background: rgba(255,255,255,0.02); border: 1px solid transparent; transition: border-color 0.2s, background 0.2s; }
        .hour-row:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        .hour-row.peak-hour { border-color: rgba(255,58,58,0.35); background: rgba(255,58,58,0.06); }
        .hour-row.safest-hour { border-color: rgba(0,230,118,0.35); background: rgba(0,230,118,0.05); }
        .hour-window { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
        .hour-bar-track { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .hour-bar-fill { height: 100%; border-radius: 4px; width: 0%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
        .hour-val { font-family: var(--display); font-weight: 900; font-size: 1rem; text-align: right; white-space: nowrap; }

        /* ── ROUTE DEPARTURE CHART ── */
        .departure-grid { display: flex; flex-direction: column; gap: 5px; }
        .dep-row { display: grid; grid-template-columns: 60px 1fr 60px 90px; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 7px; background: rgba(255,255,255,0.02); border: 1px solid transparent; cursor: default; transition: background 0.15s, border-color 0.15s; }
        .dep-row:hover { background: rgba(255,255,255,0.04); }
        .dep-row.best-time { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.06); }
        .dep-row.worst-time { border-color: rgba(255,58,58,0.35); background: rgba(255,58,58,0.05); }
        .dep-hour { font-family: var(--mono); font-size: 0.8rem; color: var(--text); font-weight: bold; }
        .dep-bar-track { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }
        .dep-bar-fill { height: 100%; border-radius: 5px; width: 0%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
        .dep-pct { font-family: var(--display); font-weight: 900; font-size: 0.95rem; text-align: right; }
        .dep-tag { font-family: var(--body); font-size: 0.68rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; text-align: center; }
        .tag-best  { background: rgba(0,230,118,0.15); color: var(--safe); border: 1px solid rgba(0,230,118,0.3); }
        .tag-worst { background: rgba(255,58,58,0.15); color: var(--danger); border: 1px solid rgba(255,58,58,0.3); }
        .tag-ok    { background: rgba(255,184,0,0.1); color: var(--warning); border: 1px solid rgba(255,184,0,0.2); font-size: 0.6rem; }
        .tag-empty { opacity: 0; }

        /* Route zones strip */
        .zones-strip { display: flex; gap: 0; border-radius: 8px; overflow: hidden; margin-bottom: 16px; height: 32px; }
        .zone-segment { display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.6rem; color: rgba(0,0,0,0.7); font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; }

        /* Chart */
        .chart-wrap { position: relative; height: 190px; }

        /* Hist card */
        .hist-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .hist-number { font-family: var(--display); font-weight: 900; font-size: 2.6rem; color: white; line-height: 1; }
        .hist-label  { font-family: var(--body); font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

        .disclaimer { margin-top: 16px; padding: 12px 14px; background: rgba(255,184,0,0.05); border: 1px solid rgba(255,184,0,0.2); border-radius: 8px; font-family: var(--body); font-size: 0.75rem; color: var(--muted); line-height: 1.6; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        @media (max-width: 700px) {
            .topbar-time { display: none; }
            .tab-bar { display: flex; }
            .layout { display: block; height: auto; }
            .sidebar { height: auto; border-right: none; }
            .sidebar.panel-hidden, .main.panel-hidden { display: none; }
            .city-list { max-height: 55vh; }
            .route-list { max-height: 55vh; }
            .stats-grid { gap: 10px; }
            .city-header-name { font-size: 1.5rem; }
            .empty-state { min-height: 40vh; }
            .hour-row { grid-template-columns: 90px 1fr 46px; }
            .dep-row { grid-template-columns: 50px 1fr 50px 70px; gap: 6px; }
        }
    </style>
</head>

<div class="topbar">
    <div class="topbar-title"><span>⚡</span> STRIKE ANALYTICS</div>
    <div class="live-badge"><div class="live-dot"></div> EN DIRECT</div>
    <div class="topbar-time" id="clock">--:--:--</div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" id="tab-list"   onclick="showTab('list')">📋 Villes / Trajets</button>
    <button class="tab-btn"        id="tab-detail" onclick="showTab('detail')">📊 Analyse</button>
</div>

<div class="layout">

    <!-- SIDEBAR -->

        <div style="padding:10px 14px; border-bottom:1px solid var(--border);">
            <div class="mode-switcher">
                <button class="mode-btn active" id="mode-city-btn"  onclick="setMode('city')">📍 Ville</button>
                <button class="mode-btn"        id="mode-route-btn" onclick="setMode('route')">🗺 Trajet routier</button>
            </div>
        </div>

        <!-- City mode controls -->
        <div id="city-controls">
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Rechercher une ville..." oninput="renderList()">
            </div>
            <div class="zone-filter" id="zone-filter"></div>
            <div class="city-list" id="city-list"></div>
        </div>

        <!-- Route mode controls -->
        <div id="route-controls" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div style="padding:10px 14px; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:0.65rem; color:var(--muted); letter-spacing:2px;">TRAJETS PRINCIPAUX</div>
            <div class="route-list" id="route-list"></div>
        </div>
    </div>

    <!-- MAIN PANEL -->
    <div class="main panel-hidden" id="panel-detail">
        <div class="empty-state" id="empty-state">
            <div class="big-icon">🎯</div>
            <div class="em-title" id="empty-title">SÉLECTIONNEZ UNE VILLE</div>
            <div class="em-sub"   id="empty-sub">pour afficher l'analyse de risque</div>
        </div>
        <div id="analytics-content" style="display:none;"></div>
    </div>

</div>

/* ════════════════════════════════════════════════
   CORE MATH
════════════════════════════════════════════════ */
function computeScore(d) { return ((d.hist / 800) + (d.recent * 0.8)) * d.weight; }
function computeProb(score) { return (1 - Math.exp(-score)) * 100; }
function marginalProb(lambdaH, h) {
    return (Math.exp(-lambdaH * (h-1)) - Math.exp(-lambdaH * h)) * 100;
}

/**
 * Compute route risk for a given departure hour (0-23).
 * For each segment we calculate: what is the probability that at least
 * one strike falls in that city WHILE the traveler is there?
 * P(strike in segment) = 1 - exp(-λ_city * duration_in_hours)
 * Route risk = 1 - ∏(1 - P_segment)   [at least one event anywhere]
 */
function routeRiskAtDeparture(route, depHour) {
    let pSafe = 1; // probability of NO event on the whole route
    let elapsed = 0; // minutes elapsed since departure

    for (const seg of route.segments) {
        const durationH = seg.minutes / 60;
        const cityData  = DATA[seg.city];
        if (!cityData) { elapsed += seg.minutes; continue; }
        const lambdaDay = computeScore(cityData);
        const lambdaH   = lambdaDay / 24;
        // Prob of NO strike in this segment
        const pSegSafe = Math.exp(-lambdaH * durationH);
        pSafe *= pSegSafe;
        elapsed += seg.minutes;
    }

    return (1 - pSafe) * 100;
}

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
function getRiskLevel(prob) {
    if (prob >= 85) return { label: '🔴 CRITIQUE', cls: 'risk-critical' };
    if (prob >= 65) return { label: '🟠 ÉLEVÉ',    cls: 'risk-high' };
    if (prob >= 40) return { label: '🟡 MODÉRÉ',   cls: 'risk-medium' };
    return                 { label: '🟢 FAIBLE',   cls: 'risk-low' };
}
function getHourColor(p) {
    if (p >= 12) return '#ff3a3a';
    if (p >= 7)  return '#ff6400';
    if (p >= 3)  return '#ffb800';
    return '#00e676';
}
function getRiskColor(p) {
    if (p >= 50) return '#ff3a3a';
    if (p >= 30) return '#ff6400';
    if (p >= 15) return '#ffb800';
    return '#00e676';
}
function pad(n) { return String(n).padStart(2,'0'); }

function showTab(tab) {
    const lp = document.getElementById('panel-list');
    const dp = document.getElementById('panel-detail');
    document.getElementById('tab-list').classList.toggle('active',   tab==='list');
    document.getElementById('tab-detail').classList.toggle('active', tab==='detail');
    tab==='list' ? (lp.classList.remove('panel-hidden'), dp.classList.add('panel-hidden'))
                 : (lp.classList.add('panel-hidden'),    dp.classList.remove('panel-hidden'));
}
function syncPanels() {
    if (!isMobile()) {
        document.getElementById('panel-list').classList.remove('panel-hidden');
        document.getElementById('panel-detail').classList.remove('panel-hidden');
    }
}

/* ════════════════════════════════════════════════
   CITY LIST
════════════════════════════════════════════════ */
function renderList() {
    const q    = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('city-list');
    list.innerHTML = '';
    Object.entries(DATA)
        .filter(([name,d]) => (activeZone==='Tous' || d.zone===activeZone) && name.toLowerCase().includes(q))
        .sort((a,b) => computeProb(computeScore(b[1])) - computeProb(computeScore(a[1])))
        .forEach(([name,d]) => {
            const prob = computeProb(computeScore(d));
            const risk = getRiskLevel(prob);
            const item = document.createElement('div');
            item.className = 'city-item' + (activeCity===name ? ' active' : '');
            item.innerHTML = `
                <div><div class="city-name">${name}</div><div class="city-zone">${d.zone}</div></div>
                <span class="city-risk-badge ${risk.cls}">${risk.label}</span>`;
            item.onclick = () => { selectCity(name); if(isMobile()) showTab('detail'); };
            list.appendChild(item);
        });
}

/* ════════════════════════════════════════════════
   ROUTE LIST
════════════════════════════════════════════════ */
function renderRouteList() {
    const list = document.getElementById('route-list');
    list.innerHTML = '';
    ROUTES.forEach(route => {
        const risks = Array.from({length:24}, (_,h) => routeRiskAtDeparture(route, h));
        const minRisk = Math.min(...risks);
        const item = document.createElement('div');
        item.className = 'route-list-item' + (activeRoute===route.id ? ' active' : '');
        item.innerHTML = `
            <div class="route-list-name">${route.name}</div>
            <div class="route-list-meta">${route.desc} · Risque min : <span style="color:var(--safe);font-weight:700;">${minRisk.toFixed(1)}%</span></div>`;
        item.onclick = () => { renderRoute(route); if(isMobile()) showTab('detail'); };
        list.appendChild(item);
    });
}

        </div>`;

    buildHourlyRows(document.getElementById('hourly-list'), score);

function buildHourlyRows(container, score) {
    const lambdaH   = score / 24;
    const marginals = Array.from({length:24}, (_,i) => marginalProb(lambdaH, i+1));
    const peakVal   = Math.max(...marginals);

    for (let h=1; h<=24; h++) {
        const p     = marginals[h-1];
        const color = getHourColor(p);
        const isPeak = p >= peakVal * 0.92;
        const row   = document.createElement('div');
        row.className = 'hour-row' + (isPeak ? ' peak-hour' : '');
        row.innerHTML = `
            <div class="hour-window">${pad(h-1)}h — ${pad(h)}h</div>
            <div class="hour-bar-track"><div class="hour-bar-fill" data-pct="${Math.min(p*5,100)}" style="background:${color};"></div></div>
            <div class="hour-val" style="color:${color};">${p.toFixed(1)}%</div>`;
        container.appendChild(row);
    }
    setTimeout(() => container.querySelectorAll('.hour-bar-fill').forEach(b => b.style.width=b.dataset.pct+'%'), 80);
}

/* ════════════════════════════════════════════════
   ROUTE DETAIL — meilleure heure de départ
════════════════════════════════════════════════ */
function renderRoute(route) {
    activeRoute = route.id;
    renderRouteList();

    // Compute risk for all 24 departure hours
    const risks = Array.from({length:24}, (_,h) => routeRiskAtDeparture(route, h));
    const maxRisk  = Math.max(...risks);
    const minRisk  = Math.min(...risks);
    const bestHour = risks.indexOf(minRisk);
    const worstHour= risks.indexOf(maxRisk);

    document.getElementById('empty-state').style.display = 'none';
    const content = document.getElementById('analytics-content');
    content.style.display = 'block';

    // Build zones strip colors
    const totalMin = route.segments.reduce((s,sg)=>s+sg.minutes,0);
    const stripHTML = route.segments.map(seg => {
        const pct = (seg.minutes / totalMin * 100).toFixed(1);
        const sc  = DATA[seg.city] ? computeScore(DATA[seg.city]) : 0;
        const p   = computeProb(sc);
        let bg = p>=85?'#ff3a3a':p>=65?'#ff6400':p>=40?'#ffb800':'#00e676';
        return `<div class="zone-segment" style="width:${pct}%;background:${bg};" title="${seg.city} (${seg.minutes} min)">${seg.city}</div>`;
    }).join('');

    content.innerHTML = `
        <div class="city-header">
            <div>
                <div class="city-header-name" style="font-size:1.4rem;">${route.name}</div>
                <div class="city-header-zone">${route.desc}</div>
            </div>
            <div class="threat-level-display">
                <div class="threat-label">Meilleur départ</div>
                <div class="threat-value" style="color:var(--safe);">${pad(bestHour)}h00</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card accent-green">
                <div class="stat-label">✅ Meilleure heure de départ</div>
                <div class="stat-number" style="color:var(--safe);">${pad(bestHour)}h00</div>
                <div class="stat-unit">Risque trajet : ${minRisk.toFixed(1)}%</div>
            </div>
            <div class="stat-card accent-red">
                <div class="stat-label">🚫 Heure à éviter</div>
                <div class="stat-number" style="color:var(--danger);">${pad(worstHour)}h00</div>
                <div class="stat-unit">Risque trajet : ${maxRisk.toFixed(1)}%</div>
            </div>
            <div class="stat-card accent-orange">
                <div class="stat-label">Durée du trajet</div>
                <div class="stat-number">${route.duration}</div>
                <div class="stat-unit">minutes</div>
            </div>
            <div class="stat-card accent-yellow">
                <div class="stat-label">Zones traversées</div>
                <div class="stat-number">${route.segments.length}</div>
                <div class="stat-unit">zones de risque différentes</div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Zones traversées — niveau de risque par segment</div>
            <div class="zones-strip">${stripHTML}</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-family:var(--body);font-size:0.72rem;color:var(--muted);">
                ${route.segments.map(seg=>{
                    const sc = DATA[seg.city] ? computeScore(DATA[seg.city]) : 0;
                    const p  = computeProb(sc);
                    const rl = getRiskLevel(p);
                    return `<span><strong style="color:white">${seg.city}</strong> ${seg.minutes} min · ${rl.label}</span>`;
                }).join('')}
            </div>
        </div>

        <div class="section-card">
            <div class="prob-header">
                <div class="prob-title">
                    <strong>Risque total du trajet selon l'heure de départ</strong><br>
                    <span style="font-size:0.72rem;opacity:0.6;">Probabilité qu'au moins un tir survienne quelque part sur la route pendant votre trajet</span>
                </div>
            </div>
            <div class="departure-grid" id="dep-grid"></div>
        </div>

        <div class="disclaimer">
            ⚠️ Le risque représente la probabilité qu'un tir survienne dans l'une des zones traversées pendant le temps où vous y circulez. Modèle statistique — pas une alerte officielle.<br>
            En cas d'alerte réelle : Pikud HaOref — פיקוד העורף
        </div>`;

    // Build departure grid
    const depGrid = document.getElementById('dep-grid');
    risks.forEach((risk, h) => {
        const color  = getRiskColor(risk);
        const isBest  = h === bestHour;
        const isWorst = h === worstHour;
        const barPct  = (risk / maxRisk * 100).toFixed(1);
        const tag     = isBest  ? `<span class="dep-tag tag-best">✅ Meilleur</span>`
                      : isWorst ? `<span class="dep-tag tag-worst">🚫 Éviter</span>`
                      : risk <= minRisk * 1.3 ? `<span class="dep-tag tag-ok">👍 Bon</span>`
                      : `<span class="dep-tag tag-empty">—</span>`;
        const row = document.createElement('div');
        row.className = 'dep-row' + (isBest?' best-time':isWorst?' worst-time':'');
        row.innerHTML = `
            <div class="dep-hour">${pad(h)}h00</div>
            <div class="dep-bar-track"><div class="dep-bar-fill" data-pct="${barPct}" style="background:${color};"></div></div>
            <div class="dep-pct" style="color:${color};">${risk.toFixed(1)}%</div>
            ${tag}`;
        depGrid.appendChild(row);
    });
    setTimeout(() => depGrid.querySelectorAll('.dep-bar-fill').forEach(b => b.style.width=b.dataset.pct+'%'), 80);
}

/* ════════════════════════════════════════════════
   TREND CHART
════════════════════════════════════════════════ */
function renderTrendChart(score) {
    setTimeout(() => {
        const ctx = document.getElementById('trendChart');
        if (!ctx) return;
        if (trendChart) trendChart.destroy();
        const labels    = ['J−3','J−2','J−1','Auj.','J+1','J+2','J+3'];
        const trendData = Array.from({length:7}, () => parseFloat((score*(0.6+Math.random()*0.8)).toFixed(2)));
        const ptColors  = labels.map((_,i) => i<3?'rgba(255,58,58,0.8)':'rgba(255,184,0,0.8)');
        trendChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets:[{
                label:'Indice de risque', data:trendData,
                borderColor:'#ff3a3a', backgroundColor:'rgba(255,58,58,0.07)',
                pointBackgroundColor:ptColors, pointBorderColor:ptColors,
                pointRadius:5, pointHoverRadius:7, fill:true, tension:0.4, borderWidth:2,
            }]},
            options: {
                responsive:true, maintainAspectRatio:false,
                plugins:{
                    legend:{display:false},
                    tooltip:{backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,titleColor:'#c8d6e5',bodyColor:'#ff3a3a',
                        titleFont:{family:'Barlow',size:12}, bodyFont:{family:'Share Tech Mono',size:13},
                        callbacks:{label:c=>' Indice : '+c.parsed.y}}
                },
                scales:{
                    x:{grid:{color:'rgba(30,42,56,0.8)'},ticks:{color:'#6b7c8f',font:{family:'Barlow',size:11}}},
                    y:{beginAtZero:true,grid:{color:'rgba(30,42,56,0.8)'},ticks:{color:'#6b7c8f',font:{family:'Barlow',size:11}}}
                }
            }
        });
    }, 150);
}
