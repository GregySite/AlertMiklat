<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Strike Analytics — Live Israel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #ff3a3a;
            --warning: #ffb800;
            --safe: #00e676;
            --bg: #07090d;
            --surface: #0d1117;
            --card: #111820;
            --border: #1e2a38;
            --text: #c8d6e5;
            --muted: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --display: 'Barlow Condensed', sans-serif;
            --body: 'Barlow', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none; z-index: 999;
        }

        .topbar {
            background: var(--surface); border-bottom: 2px solid var(--danger);
            padding: 10px 16px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 8px;
        }
        .topbar-title { font-family: var(--display); font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; color: white; white-space: nowrap; }
        .topbar-title span { color: var(--danger); }
        .live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.7rem; color: var(--danger); white-space: nowrap; }
        .live-dot { width: 7px; height: 7px; background: var(--danger); border-radius: 50%; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
        .topbar-time { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

        .tab-bar { display: none; background: var(--surface); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; font-family: var(--display); font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: white; border-bottom-color: var(--danger); }

        .layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 53px); }

        .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; display: flex; justify-content: space-between; }

        .mode-switcher { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .mode-btn { flex: 1; padding: 9px 8px; background: transparent; border: none; border-right: 1px solid var(--border); font-family: var(--body); font-size: 0.8rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active { background: rgba(255,58,58,0.12); color: white; }
        .mode-btn:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text); }

        .search-box { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .search-box input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: var(--body); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: var(--danger); }

        .zone-filter { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 5px; flex-wrap: wrap; }
        .zone-btn { padding: 5px 11px; border-radius: 20px; font-size: 0.75rem; font-family: var(--body); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: 0.2s; }
        .zone-btn.active, .zone-btn:hover { border-color: var(--danger); color: white; background: rgba(255,58,58,0.1); }

        .city-list, .route-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .city-item, .route-list-item { padding: 13px 18px; cursor: pointer; border-bottom: 1px solid rgba(30,42,56,0.5); display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; position: relative; overflow: hidden; }
        .city-item::before, .route-list-item::before { content: ''; position: absolute; left:0; top:0; bottom:0; width:3px; background: var(--danger); transform: scaleY(0); transition: transform 0.2s; }
        .city-item:hover, .route-list-item:hover { background: rgba(255,58,58,0.05); }
        .city-item:hover::before, .city-item.active::before, .route-list-item:hover::before, .route-list-item.active::before { transform: scaleY(1); }
        .city-item.active, .route-list-item.active { background: rgba(255,58,58,0.08); }
        
        .city-name, .route-list-name { font-family: var(--display); font-weight: 700; font-size: 1.05rem; color: white; }
        .city-zone, .route-list-meta { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
        
        .city-risk-badge { font-family: var(--body); font-size: 0.72rem; padding: 4px 9px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .risk-critical { background: rgba(255,58,58,0.2); color: var(--danger); border: 1px solid rgba(255,58,58,0.4); }
        .risk-high     { background: rgba(255,100,0,0.2); color: #ff6400; border: 1px solid rgba(255,100,0,0.4); }
        .risk-medium   { background: rgba(255,184,0,0.2); color: var(--warning); border: 1px solid rgba(255,184,0,0.4); }
        .risk-low      { background: rgba(0,230,118,0.1); color: var(--safe); border: 1px solid rgba(0,230,118,0.3); }

        .main { overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 14px; text-align: center; }
        .empty-state .big-icon { font-size: 3rem; opacity: 0.3; }
        .em-title { font-family: var(--display); font-size: 1.1rem; letter-spacing: 2px; }
        
        .disclaimer-top { margin-bottom: 20px; padding: 12px 14px; background: rgba(255,58,58,0.05); border: 1px solid rgba(255,58,58,0.2); border-left: 4px solid var(--danger); border-radius: 6px; font-family: var(--body); font-size: 0.8rem; color: var(--text); line-height: 1.5; }
        .disclaimer-top strong { color: white; }

        .city-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
        .city-header-name { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; text-transform: uppercase; letter-spacing: 2px; line-height: 1; }
        .city-header-zone { font-family: var(--body); font-size: 0.8rem; color: var(--muted); margin-top: 5px; }
        .threat-level-display { text-align: right; }
        .threat-label { font-family: var(--body); font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }
        .threat-value { font-family: var(--display); font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; margin-top: 4px; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 18px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; position: relative; overflow: hidden; }
        .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
        .stat-card.accent-red::after    { background: var(--danger); }
        .stat-card.accent-orange::after { background: #ff6400; }
        .stat-card.accent-yellow::after { background: var(--warning); }
        .stat-card.accent-green::after  { background: var(--safe); }
        .stat-label { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        .stat-number { font-family: var(--display); font-weight: 900; font-size: 2rem; color: white; line-height: 1; }
        .stat-unit { font-family: var(--body); font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

        .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 18px; }
        .section-title { font-family: var(--body); font-size: 0.75rem; color: var(--text); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

        .zones-strip { display: flex; gap: 0; border-radius: 8px; overflow: hidden; margin-bottom: 16px; height: 32px; }
        .zone-segment { display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.65rem; color: rgba(0,0,0,0.8); font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; }

        .chart-wrap { position: relative; height: 220px; width: 100%; }

        @media (max-width: 700px) {
            .topbar-time { display: none; }
            .tab-bar { display: flex; }
            .layout { display: block; height: auto; }
            .sidebar { height: auto; border-right: none; }
            .sidebar.panel-hidden, .main.panel-hidden { display: none; }
            .city-list, .route-list { max-height: 55vh; }
            .stats-grid { gap: 10px; }
            .city-header-name { font-size: 1.5rem; }
            .empty-state { min-height: 40vh; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-title"><span>⚡</span> TENSION ANALYTICS</div>
    <div class="live-badge"><div class="live-dot"></div> SYNC AUTO</div>
    <div class="topbar-time" id="clock">--:--:--</div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" id="tab-list"   onclick="showTab('list')">📋 Zones / Trajets</button>
    <button class="tab-btn"        id="tab-detail" onclick="showTab('detail')">📊 Analyse</button>
</div>

<div class="layout">

    <div class="sidebar" id="panel-list">
        <div class="sidebar-header">
            <span>— Données en temps réel —</span>
            <span id="sync-status" style="color:var(--muted)">Initialisation...</span>
        </div>
        <div style="padding:10px 14px; border-bottom:1px solid var(--border);">
            <div class="mode-switcher">
                <button class="mode-btn active" id="mode-city-btn"  onclick="setMode('city')">📍 Villes</button>
                <button class="mode-btn"        id="mode-route-btn" onclick="setMode('route')">🗺 Trajets</button>
            </div>
        </div>

        <div id="city-controls" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Rechercher une ville..." oninput="renderList()">
            </div>
            <div class="zone-filter" id="zone-filter"></div>
            <div class="city-list" id="city-list"></div>
        </div>

        <div id="route-controls" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div style="padding:10px 14px; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:0.65rem; color:var(--muted); letter-spacing:2px;">TRAJETS PRINCIPAUX</div>
            <div class="route-list" id="route-list"></div>
        </div>
    </div>

    <div class="main panel-hidden" id="panel-detail">
        <div class="empty-state" id="empty-state">
            <div class="big-icon">🎯</div>
            <div class="em-title" id="empty-title">SÉLECTIONNEZ UNE ZONE</div>
            <div class="em-sub"   id="empty-sub">pour afficher l'indice d'exposition en direct</div>
        </div>
        
        <div id="analytics-content" style="display:none;"></div>
    </div>

</div>

<script>
/* ════════════════════════════════════════════════
   BASE DE DONNÉES ENRICHIE (Villes d'Israël)
════════════════════════════════════════════════ */
const DB_CITIES = {
    // === NORD ===
    "Kiryat Shmona": { keys: ["קריית שמונה"], hist: 4200, weight: 1.9, zone: "Nord" },
    "Metula":        { keys: ["מטולה"], hist: 3100, weight: 1.8, zone: "Nord" },
    "Nahariya":      { keys: ["נהריה"], hist: 1200, weight: 1.5, zone: "Nord" },
    "Haïfa":         { keys: ["חיפה"], hist: 850, weight: 1.4, zone: "Nord" },
    "Safed":         { keys: ["צפת"], hist: 620, weight: 1.3, zone: "Nord" },
    "Acre":          { keys: ["עכו"], hist: 310, weight: 1.2, zone: "Nord" },
    "Tibériade":     { keys: ["טבריה"], hist: 430, weight: 1.2, zone: "Nord" },
    "Karmiel":       { keys: ["כרמיאל"], hist: 180, weight: 1.1, zone: "Nord" },
    "Katzrin":       { keys: ["קצרין"], hist: 150, weight: 1.2, zone: "Nord" },
    "Afula":         { keys: ["עפולה"], hist: 80, weight: 1.0, zone: "Nord" },
    "Nazareth":      { keys: ["נצרת"], hist: 60, weight: 1.0, zone: "Nord" },

    // === CENTRE (Gush Dan étendu) ===
    "Tel Aviv":      { keys: ["תל אביב"], hist: 320, weight: 1.2, zone: "Centre" },
    "Jérusalem":     { keys: ["ירושלים - דרום", "ירושלים - מזרח", "ירושלים - מערב", "ירושלים - מרכז", "ירושלים - צפון", "ירושלים כולה"], hist: 580, weight: 1.3, zone: "Centre" },
    "Netanya":       { keys: ["נתניה"], hist: 210, weight: 1.1, zone: "Centre" },
    "Rishon LeZion": { keys: ["ראשון לציון"], hist: 190, weight: 1.1, zone: "Centre" },
    "Petah Tikva":   { keys: ["פתח תקווה"], hist: 175, weight: 1.1, zone: "Centre" },
    "Holon":         { keys: ["חולון"], hist: 155, weight: 1.1, zone: "Centre" },
    "Rehovot":       { keys: ["רחובות"], hist: 160, weight: 1.1, zone: "Centre" },
    "Bat Yam":       { keys: ["בת ים"], hist: 140, weight: 1.0, zone: "Centre" },
    "Ramat Gan":     { keys: ["רמת גן"], hist: 130, weight: 1.0, zone: "Centre" },
    "Herzliya":      { keys: ["הרצליה"], hist: 115, weight: 1.0, zone: "Centre" },
    "Modi'in":       { keys: ["מודיעין"], hist: 90, weight: 1.0, zone: "Centre" },
    "Lod":           { keys: ["לוד"], hist: 85, weight: 1.0, zone: "Centre" },

    // === SUD & GAZA BELT ===
    "Sderot":        { keys: ["שדרות"], hist: 2100, weight: 1.6, zone: "Sud" },
    "Ashkelon":      { keys: ["אשקלון"], hist: 1900, weight: 1.5, zone: "Sud" },
    "Netivot":       { keys: ["נתיבות"], hist: 980, weight: 1.4, zone: "Sud" },
    "Ofakim":        { keys: ["אופקים"], hist: 760, weight: 1.3, zone: "Sud" },
    "Ashdod":        { keys: ["אשדוד"], hist: 680, weight: 1.3, zone: "Sud" },
    "Kiryat Gat":    { keys: ["קריית גת"], hist: 420, weight: 1.2, zone: "Sud" },
    "Be'er Sheva":   { keys: ["באר שבע"], hist: 150, weight: 1.1, zone: "Sud" },
    "Dimona":        { keys: ["דימונה"], hist: 80, weight: 1.0, zone: "Sud" },
    "Arad":          { keys: ["ערד"], hist: 60, weight: 1.0, zone: "Sud" },
    "Eilat":         { keys: ["אילת"], hist: 45, weight: 1.0, zone: "Sud" },
    "Gaza Environs": { keys: ["עוטף עזה"], hist: 4500, weight: 2.0, zone: "Sud" }
};

let LIVE_DATA = {};
let HOURLY_DISTRIBUTION = {}; 

/* ════════════════════════════════════════════════
   TRAJETS ÉTENDUS
════════════════════════════════════════════════ */
const ROUTES = [
    { id: "tlv-jlm", name: "Tel Aviv ⇄ Jérusalem", duration: 55, desc: "Route 1", segments: [{ city: "Tel Aviv", minutes: 15 }, { city: "Modi'in", minutes: 20 }, { city: "Jérusalem", minutes: 20 }] },
    { id: "hfa-tlv", name: "Haïfa ⇄ Tel Aviv", duration: 70, desc: "Autoroute 2 (Côtière)", segments: [{ city: "Haïfa", minutes: 20 }, { city: "Netanya", minutes: 25 }, { city: "Herzliya", minutes: 10 }, { city: "Tel Aviv", minutes: 15 }] },
    { id: "bsh-tlv", name: "Be'er Sheva ⇄ Tel Aviv", duration: 80, desc: "Autoroute 40", segments: [{ city: "Be'er Sheva", minutes: 20 }, { city: "Kiryat Gat", minutes: 20 }, { city: "Rehovot", minutes: 20 }, { city: "Tel Aviv", minutes: 20 }] },
    { id: "tlv-eil", name: "Tel Aviv → Eilat", duration: 240, desc: "Route 40 / Arava", segments: [{ city: "Tel Aviv", minutes: 20 }, { city: "Be'er Sheva", minutes: 60 }, { city: "Dimona", minutes: 40 }, { city: "Eilat", minutes: 120 }] },
    { id: "jlm-ksh", name: "Jérusalem → Kiryat Shmona", duration: 150, desc: "Vallée du Jourdain / Route 90", segments: [{ city: "Jérusalem", minutes: 30 }, { city: "Tibériade", minutes: 60 }, { city: "Kiryat Shmona", minutes: 60 }] },
    { id: "ash-tlv", name: "Ashkelon ⇄ Tel Aviv", duration: 50, desc: "Autoroute 4", segments: [{ city: "Ashkelon", minutes: 15 }, { city: "Ashdod", minutes: 15 }, { city: "Rishon LeZion", minutes: 10 }, { city: "Tel Aviv", minutes: 10 }] },
    { id: "sdr-bsh", name: "Sderot ⇄ Be'er Sheva", duration: 40, desc: "Route 25", segments: [{ city: "Sderot", minutes: 15 }, { city: "Netivot", minutes: 10 }, { city: "Be'er Sheva", minutes: 15 }] },
    { id: "hfa-ksh", name: "Haïfa ⇄ Kiryat Shmona", duration: 90, desc: "Route 85 / 90", segments: [{ city: "Haïfa", minutes: 20 }, { city: "Acre", minutes: 10 }, { city: "Karmiel", minutes: 30 }, { city: "Kiryat Shmona", minutes: 30 }] },
];

/* ════════════════════════════════════════════════
   ALGORITHMES D'ANALYSE (Score Pondéré)
════════════════════════════════════════════════ */
function computeTensionIndex(cityData) { 
    if (!cityData) return 0;
    const score = (cityData.hist / 200) + (cityData.recent * 15);
    return Math.min(100, score * cityData.weight); 
}

function getRiskLevel(tension) {
    if (tension >= 75) return { label: '🔴 CRITIQUE', cls: 'risk-critical', color: '#ff3a3a' };
    if (tension >= 40) return { label: '🟠 ÉLEVÉE',   cls: 'risk-high', color: '#ff6400' };
    if (tension >= 15) return { label: '🟡 MODÉRÉE',  cls: 'risk-medium', color: '#ffb800' };
    return             { label: '🟢 FAIBLE',       cls: 'risk-low', color: '#00e676' };
}

// Calcule la tension globale d'un trajet (Moyenne pondérée par le temps passé)
function computeRouteTension(route) {
    let totalTension = 0;
    let totalMinutes = 0;
    route.segments.forEach(s => {
        const cityTension = LIVE_DATA[s.city] ? computeTensionIndex(LIVE_DATA[s.city]) : 0;
        totalTension += cityTension * s.minutes;
        totalMinutes += s.minutes;
    });
    return totalMinutes > 0 ? (totalTension / totalMinutes) : 0;
}

/* ════════════════════════════════════════════════
   SYNCHRONISATION AUTOMATIQUE
════════════════════════════════════════════════ */
async function fetchWorkerData() {
    try {
        const res = await fetch('https://miklat-v2.gregyman.workers.dev/');
        const data = await res.json();
        
        for (const [name, info] of Object.entries(DB_CITIES)) {
            LIVE_DATA[name] = { ...info, recent: 0 };
            HOURLY_DISTRIBUTION[name] = new Array(24).fill(0);
        }

        // On inclut l'alerte active dans l'historique récent pour les stats !
        let allEvents = data.history ? [...data.history] : [];
        if (data.active) allEvents.push(data.active);

        if (allEvents.length > 0) {
            allEvents.forEach(ev => {
                if (ev.cat === 13 || ev.cat === 14 || ev.cat > 100) return; 
                
                let targetCity = null;
                for (const [name, info] of Object.entries(DB_CITIES)) {
                    if (info.keys.some(k => ev.cities.includes(k))) { targetCity = name; break; }
                }
                
                if (targetCity) {
                    LIVE_DATA[targetCity].recent++;
                    const evDate = new Date(ev.time * 1000);
                    const hour = evDate.getHours();
                    HOURLY_DISTRIBUTION[targetCity][hour]++;
                }
            });
        }
        
        const timeNow = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('sync-status').innerHTML = `🔄 Actualisé à ${timeNow}`;
        document.getElementById('sync-status').style.color = "var(--safe)";
        
        renderList();
        renderRouteList();
        
        if (activeCity && currentMode === 'city') selectCity(activeCity);
        else if (activeRoute && currentMode === 'route') renderRoute(ROUTES.find(r => r.id === activeRoute));

    } catch(e) {
        document.getElementById('sync-status').textContent = "⚠️ Mode hors-ligne";
        document.getElementById('sync-status').style.color = "var(--warning)";
    }
}

/* ════════════════════════════════════════════════
   UI STATE & RENDER
════════════════════════════════════════════════ */
let activeCity    = null;
let activeRoute   = null;
let activeZone    = 'Tous';
let currentMode   = 'city';
let trendChart    = null;
let isMobile      = () => window.innerWidth <= 700;

function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-city-btn').classList.toggle('active',  mode==='city');
    document.getElementById('mode-route-btn').classList.toggle('active', mode==='route');
    document.getElementById('city-controls').style.display  = mode==='city'  ? 'flex' : 'none';
    document.getElementById('route-controls').style.display = mode==='route' ? 'flex' : 'none';

    const es = document.getElementById('empty-state');
    es.style.display = 'flex';
    document.getElementById('analytics-content').style.display = 'none';
    
    if (mode === 'route') {
        document.getElementById('empty-title').textContent = 'SÉLECTIONNEZ UN TRAJET';
        document.getElementById('empty-sub').textContent   = 'pour évaluer l\'exposition par segment routier';
        if (isMobile()) showTab('detail');
        if (!activeRoute) activeRoute = ROUTES[0].id;
        renderRoute(ROUTES.find(r => r.id === activeRoute));
    } else {
        document.getElementById('empty-title').textContent = 'SÉLECTIONNEZ UNE ZONE';
        document.getElementById('empty-sub').textContent   = 'pour afficher l\'indice d\'exposition en direct';
    }
}

function showTab(tab) {
    const lp = document.getElementById('panel-list');
    const dp = document.getElementById('panel-detail');
    document.getElementById('tab-list').classList.toggle('active',   tab==='list');
    document.getElementById('tab-detail').classList.toggle('active', tab==='detail');
    tab==='list' ? (lp.classList.remove('panel-hidden'), dp.classList.add('panel-hidden'))
                 : (lp.classList.add('panel-hidden'),    dp.classList.remove('panel-hidden'));
}
window.addEventListener('resize', () => {
    if (!isMobile()) {
        document.getElementById('panel-list').classList.remove('panel-hidden');
        document.getElementById('panel-detail').classList.remove('panel-hidden');
    }
});

const zones = ['Tous', ...new Set(Object.values(DB_CITIES).map(d=>d.zone))];
const zoneFilter = document.getElementById('zone-filter');
zones.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'zone-btn' + (z==='Tous' ? ' active' : '');
    btn.textContent = z;
    btn.onclick = () => {
        activeZone = z;
        document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    };
    zoneFilter.appendChild(btn);
});

function renderList() {
    if(Object.keys(LIVE_DATA).length === 0) return;
    const q    = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('city-list');
    list.innerHTML = '';
    
    Object.entries(LIVE_DATA)
        .filter(([name,d]) => (activeZone==='Tous' || d.zone===activeZone) && name.toLowerCase().includes(q))
        .sort((a,b) => computeTensionIndex(b[1]) - computeTensionIndex(a[1]))
        .forEach(([name,d]) => {
            const tension = computeTensionIndex(d);
            const risk = getRiskLevel(tension);
            const item = document.createElement('div');
            item.className = 'city-item' + (activeCity===name ? ' active' : '');
            item.innerHTML = `
                <div><div class="city-name">${name}</div><div class="city-zone">${d.zone}</div></div>
                <span class="city-risk-badge ${risk.cls}">${risk.label.replace('TENSION ', '')}</span>`;
            item.onclick = () => { selectCity(name); if(isMobile()) showTab('detail'); };
            list.appendChild(item);
        });
}

function renderRouteList() {
    const list = document.getElementById('route-list');
    list.innerHTML = '';
    
    // On trie les routes par score de tension décroissant
    const sortedRoutes = [...ROUTES].sort((a, b) => computeRouteTension(b) - computeRouteTension(a));

    sortedRoutes.forEach(route => {
        const routeTension = computeRouteTension(route);
        const rl = getRiskLevel(routeTension);

        const item = document.createElement('div');
        item.className = 'route-list-item' + (activeRoute===route.id ? ' active' : '');
        item.innerHTML = `
            <div class="route-list-name">${route.name}</div>
            <div class="route-list-meta">${route.desc} · Indice global: <span style="color:${rl.color};font-weight:700;">${routeTension.toFixed(1)}/100</span></div>`;
        item.onclick = () => { renderRoute(route); if(isMobile()) showTab('detail'); };
        list.appendChild(item);
    });
}

/* ════════════════════════════════════════════════
   CITY DETAIL (Analyse Data)
════════════════════════════════════════════════ */
function selectCity(name) {
    activeCity = name;
    renderList();
    const d       = LIVE_DATA[name];
    const tension = computeTensionIndex(d);
    const risk    = getRiskLevel(tension);

    document.getElementById('empty-state').style.display = 'none';
    const content = document.getElementById('analytics-content');
    content.style.display = 'block';

    content.innerHTML = `
        <div class="disclaimer-top">
            <strong>⚠️ Outil d'Analyse Historique</strong><br>
            Les données reflètent l'intensité des événements passés (base de données et Cloudflare 24h). Cet écran ne prédit pas l'avenir. Consultez le Pikud HaOref en cas d'alerte.
        </div>

        <div class="city-header">
            <div>
                <div class="city-header-name">${name}</div>
                <div class="city-header-zone">Zone géographique : ${d.zone}</div>
            </div>
            <div class="threat-level-display">
                <div class="threat-label">Indice d'Exposition</div>
                <div class="threat-value ${risk.cls}">${risk.label}</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card accent-red">
                <div class="stat-label">Alertes (24h)</div>
                <div class="stat-number">${d.recent}</div>
                <div class="stat-unit">Source : Live API</div>
            </div>
            <div class="stat-card accent-orange">
                <div class="stat-label">Indice Tension</div>
                <div class="stat-number">${tension.toFixed(0)} <span style="font-size:1rem">/ 100</span></div>
                <div class="stat-unit">Calcul analytique</div>
            </div>
            <div class="stat-card accent-yellow">
                <div class="stat-label">Historique</div>
                <div class="stat-number">${d.hist.toLocaleString('fr-FR')}</div>
                <div class="stat-unit">Depuis 2006</div>
            </div>
            <div class="stat-card accent-green">
                <div class="stat-label">Multiplicateur</div>
                <div class="stat-number">×${d.weight.toFixed(1)}</div>
                <div class="stat-unit">Proximité frontières</div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Distribution des alertes (Réalité des dernières 24h)</div>
            <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </div>`;

    render24hChart(name);
}

/* ════════════════════════════════════════════════
   ROUTE DETAIL (Analyse Globale)
════════════════════════════════════════════════ */
function renderRoute(route) {
    activeRoute = route.id;
    renderRouteList();

    document.getElementById('empty-state').style.display = 'none';
    const content = document.getElementById('analytics-content');
    content.style.display = 'block';

    const totalMin = route.segments.reduce((s,sg)=>s+sg.minutes,0);
    const routeTension = computeRouteTension(route);
    const routeRisk = getRiskLevel(routeTension);

    const stripHTML = route.segments.map(seg => {
        const pct = (seg.minutes / totalMin * 100).toFixed(1);
        const t = LIVE_DATA[seg.city] ? computeTensionIndex(LIVE_DATA[seg.city]) : 0;
        const rl = getRiskLevel(t);
        return `<div class="zone-segment" style="width:${pct}%;background:${rl.color}; color:#fff;" title="${seg.city} (${seg.minutes} min)">${seg.city}</div>`;
    }).join('');

    content.innerHTML = `
        <div class="disclaimer-top">
            <strong>⚠️ Évaluation d'Exposition Routière</strong><br>
            Le "Score Global" évalue la tension moyenne du trajet en fonction du temps que vous passez dans chaque zone. Ce n'est pas une garantie de sécurité.
        </div>

        <div class="city-header">
            <div>
                <div class="city-header-name" style="font-size:1.6rem;">${route.name}</div>
                <div class="city-header-zone">${route.desc} · Trajet de ${route.duration} minutes</div>
            </div>
            <div class="threat-level-display">
                <div class="threat-label">Tension Globale du Trajet</div>
                <div class="threat-value" style="color:${routeRisk.color};">${routeTension.toFixed(1)} <span style="font-size:1rem;color:var(--muted)">/ 100</span></div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Cartographie du trajet par niveau de tension</div>
            <div class="zones-strip" style="height: 40px;">${stripHTML}</div>
            <div style="display:flex; flex-direction:column; gap:8px; margin-top: 16px;">
                ${route.segments.map(seg=>{
                    const t = LIVE_DATA[seg.city] ? computeTensionIndex(LIVE_DATA[seg.city]) : 0;
                    const rl = getRiskLevel(t);
                    const recentHits = LIVE_DATA[seg.city] ? LIVE_DATA[seg.city].recent : 0;
                    return `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px;">
                        <div>
                            <strong style="color:white; font-size:1.1rem;">${seg.city}</strong>
                            <span style="color:var(--muted); font-size:0.8rem; margin-left:8px;">Durée : ${seg.minutes} min</span>
                        </div>
                        <div style="text-align:right;">
                            <span class="city-risk-badge" style="background:${rl.color}22; color:${rl.color}; border: 1px solid ${rl.color}55;">${rl.label.replace('TENSION ', '')}</span>
                            <div style="font-size:0.7rem; color:var(--muted); margin-top:4px;">${recentHits} alerte(s) en 24h</div>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
}

function render24hChart(cityName) {
    setTimeout(() => {
        const ctx = document.getElementById('trendChart');
        if (!ctx) return;
        if (trendChart) trendChart.destroy();
        
        const labels = Array.from({length:24}, (_,i) => i+'h');
        let data = HOURLY_DISTRIBUTION[cityName] || new Array(24).fill(0);
        
        const hasData = data.some(v => v > 0);
        
        trendChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels, 
                datasets:[{
                    label: 'Alertes recensées', 
                    data: data,
                    backgroundColor: hasData ? 'rgba(255,58,58,0.8)' : 'rgba(74, 85, 104, 0.3)',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { 
                        backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1, 
                        titleColor:'#c8d6e5', bodyColor:'#ff3a3a',
                        titleFont:{family:'Barlow',size:13}, bodyFont:{family:'Barlow',size:14, weight:'bold'},
                        callbacks: { label: c => ' ' + c.raw + (c.raw > 1 ? ' alertes' : ' alerte') }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7c8f', font: {family:'Share Tech Mono',size:10} } },
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(30,42,56,0.5)' }, 
                        ticks: { stepSize: 1, color: '#6b7c8f', font: {family:'Share Tech Mono',size:11} },
                        suggestedMax: hasData ? undefined : 3
                    }
                }
            }
        });
    }, 100);
}

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR',{timeZone:'Asia/Jerusalem',hour12:false});
}
setInterval(updateClock,1000);
updateClock();

// Démarrage et rafraichissement automatique toutes les 60 secondes !
fetchWorkerData();
setInterval(fetchWorkerData, 60000);

</script>
