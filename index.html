<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLM Alerte</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .danger { background: #ff0000; }
        .wait { background: #ff8c00; }
        h1 { font-size: 3em; }
        #timer { font-size: 5em; font-weight: bold; }
    </style>
</head>
<body id="b">
    <h1 id="s">VÉRIFICATION...</h1>
    <div id="timer"></div>
    <div id="log" style="position:fixed; bottom:10px; width:100%; font-size:0.7em;"></div>

    <script>
        const CITY = "ירושלים";
        const URL = "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json";
        let isDanger = false;

        async function update() {
            try {
                // Requête directe sans intermédiaire
                const r = await fetch(URL + "?t=" + Date.now());
                const data = await r.json();
                
                const active = data.some(a => a.data.includes(CITY));

                if (active && !isDanger) {
                    isDanger = true;
                    document.getElementById('b').className = "danger";
                    document.getElementById('s').innerText = "À L'ABRI !";
                    document.getElementById('timer').innerText = "";
                } else if (!active && isDanger) {
                    startCountdown();
                } else if (!active && !isDanger) {
                    document.getElementById('b').className = "";
                    document.getElementById('s').innerText = "CIEL DÉGAGÉ";
                    document.getElementById('timer').innerText = "";
                }
                document.getElementById('log').innerText = "MàJ: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('log').innerText = "Blocage navigateur (CORS). Activez l'extension.";
            }
        }

        function startCountdown() {
            isDanger = false;
            document.getElementById('b').className = "wait";
            document.getElementById('s').innerText = "ATTENTE SÉCURITÉ";
            let s = 600;
            const t = setInterval(() => {
                s--;
                document.getElementById('timer').innerText = Math.floor(s/60) + ":" + (s%60).toString().padStart(2,'0');
                if (s <= 0) { clearInterval(t); update(); }
            }, 1000);
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
