<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLM DIRECT</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        /* On force l'affichage du flux officiel dans une fenêtre invisible */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            /* Zoom pour voir les alertes en gros sur mobile */
            transform: scale(1.5);
            transform-origin: top center;
        }
    </style>
</head>
<body>
    <iframe src="https://www.oref.org.il/en/alerts-history"></iframe>
</body>
</html>
