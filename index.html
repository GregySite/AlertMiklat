<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jérusalem Alert</title>
    <style>
        body { 
            margin: 0; font-family: system-ui, -apple-system, sans-serif;
            background: #121212; color: white; height: 100vh;
            display: flex; flex-direction: column; transition: background 0.5s;
        }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .city { font-size: 1.5rem; opacity: 0.8; margin-bottom: 10px; }
        .status { font-size: 2.5rem; font-weight: 900; line-height: 1.1; padding: 0 20px; }
        .timer { font-size: 5rem; font-weight: bold; font-family: monospace; margin: 20px 0; }
        #footer { padding: 20px; font-size: 0.8rem; opacity: 0.5; text-align: center; }
        
        /* États */
        .bg-safe { background-color: #1b5e20; }
        .bg-danger { background-color: #b71c1c; animation: flash 1s infinite; }
        .bg-wait { background-color: #e65100; }

        @keyframes flash { 0% {opacity: 1} 50% {opacity: 0.7} 100% {opacity: 1} }
    </style>
</head>
<body class="bg-safe">

    <div id="main">
        <div class="city">ירושלים (Jérusalem)</div>
        <div id="status" class="status">CONNEXION...</div>
        <div id="timer" class="timer"></div>
    </div>

    <div id="footer">
        Dernière mise à jour : <span id="sync">--:--:--</span>
        <br><small>Glissez vers le bas pour forcer</small>
    </div>

    <script>
        const CITY = "ירושלים";
        // Proxy hybride pour mobile (plus résistant au blocage)
        const URL_TARGET = "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json";
        const PROXY = "https://thingproxy.freeboard.io/fetch/"; 

        let isDanger = false;
        let countdown = null;

        async function check() {
            try {
                // Ajout d'un paramètre aléatoire pour éviter le cache opérateur
                const fetchUrl = PROXY + URL_TARGET + "?t=" + Date.now();
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                
                // On vérifie si la ville est dans le flux
                const alertActive = data.some(a => a.data && a.data.includes(CITY));

                if (alertActive && !isDanger) {
                    triggerDanger();
                } else if (!alertActive && isDanger) {
                    triggerWait();
                } else if (!alertActive && !isDanger && !countdown) {
                    setSafe();
                }

                document.getElementById('sync').innerText = new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('sync').innerText = "Erreur de flux (Re-tentative...)";
            }
        }

        function triggerDanger() {
            isDanger = true;
            if (countdown) clearInterval(countdown);
            document.body.className = "bg-danger";
            document.getElementById('status').innerText = "⚠️ ALERTE : À L'ABRI !";
            document.getElementById('timer').innerText = "VITE";
        }

        function triggerWait() {
            isDanger = false;
            document.body.className = "bg-wait";
            document.getElementById('status').innerText = "SÉCURITÉ DÉBRIS";
            
            let seconds = 600; // 10 minutes
            if (countdown) clearInterval(countdown);
            
            countdown = setInterval(() => {
                seconds--;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (seconds <= 0) setSafe();
            }, 1000);
        }

        function setSafe() {
            isDanger = false;
            if (countdown) clearInterval(countdown);
            countdown = null;
            document.body.className = "bg-safe";
            document.getElementById('status').innerText = "CIEL DÉGAGÉ";
            document.getElementById('timer').innerText = "RAS";
        }

        // Cycle de 3 secondes (idéal smartphone)
        setInterval(check, 3000);
        check();

        // Support du rafraîchissement natif
        window.addEventListener('touchstart', function() {}, {passive: true});
    </script>
</body>
</html>
