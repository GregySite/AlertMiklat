<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alerte Jérusalem</title>
    <style>
        /* La page est légèrement plus haute pour permettre le "pull-to-refresh" */
        body { margin: 0; min-height: 101vh; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: background 0.3s; background: #2ecc71; color: white; }
        .t { font-size: 2em; font-weight: 900; }
        .timer { font-size: 4em; font-weight: bold; margin: 20px 0; }
        #msg { font-size: 0.8em; opacity: 0.7; margin-top: 20px; }
        .danger { background: #e74c3c; }
        .wait { background: #f39c12; }
    </style>
</head>
<body id="b" onclick="location.reload()"> <div id="statut" class="t">CHARGEMENT...</div>
    <div id="timer" class="timer"></div>
    <div id="msg">Cliquez ici pour forcer le rafraîchissement</div>

    <script>
        const CITY = "ירושלים";
        const API = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.oref.org.il/WarningMessages/History/AlertsHistory.json?t=" + Date.now());

        async function update() {
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error("Erreur réseau");
                const data = await res.json();
                const alerts = JSON.parse(data.contents);

                const active = alerts.some(a => a.data.includes(CITY));
                
                if (active) {
                    document.getElementById('b').className = "danger";
                    document.getElementById('statut').innerText = "⚠️ ABRI IMMÉDIAT";
                    document.getElementById('timer').innerText = "!!";
                } else {
                    document.getElementById('b').className = "";
                    document.getElementById('statut').innerText = "CIEL DÉGAGÉ";
                    document.getElementById('timer').innerText = "";
                }
                document.getElementById('msg').innerText = "Dernière synchro: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('statut').innerText = "ERREUR";
                document.getElementById('msg').innerText = "Impossible de joindre le serveur. Tirez vers le bas pour réessayer.";
            }
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
